version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: libbook
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  backend:
    build: ./backend
    env_file: .env
    ports:
      - 3000:3000
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - 8080:80
    depends_on:
      - backend

volumes:
  db-data:
